<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>РЕТРОКОСМОС: Битва у темных звезд</title>
    <style>
        body { margin: 0; background: #010000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; filter: contrast(1.4) brightness(1.1); }
        
        /* ЭФФЕКТ СТАРОГО МОНИТОРА (ОСЛАБЛЕН ВДВОЕ) */
        .overlay, #boot-screen::before, #ui-layer::before {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 1, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 1000; content: "";
        }

        /* --- СТИЛИ ДЛЯ ВСТУПЛЕНИЯ (BIOS) --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff8b00; z-index: 100;
            padding: 30px; 
            font-size: 20px; text-shadow: 0 0 8px #ff8b00;
        }
        #boot-terminal { 
            white-space: pre-wrap; line-height: 1.5; 
            text-align: left; 
        }
        .glitch-out { animation: glitch 0.3s forwards; }
        @keyframes glitch {
            0% { transform: translate(0); opacity: 1; }
            20% { transform: translate(-10px, 5px); opacity: 0.8; filter: hue-rotate(90deg); }
            40% { transform: translate(10px, -5px); opacity: 0.9; filter: invert(1); }
            100% { opacity: 0; display: none; }
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20; pointer-events: none;
        }
        #title-container {
            position: absolute; top: 40px; text-align: center;
            color: #ff8b00; font-size: 34px; font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 139, 0, 0.7);
            letter-spacing: 2px; transition: opacity 2s; line-height: 1.5;
        }
        .menu-box { display: flex; flex-direction: column; align-items: center; gap: 20px; transition: opacity 1s; }
        .btn-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; }

        .amber-btn {
            background: #000; color: #ff8b00; border: 3px solid #ff8b00;
            width: 320px; height: 75px; font-family: 'Courier New', monospace;
            font-size: 20px; font-weight: bold; cursor: pointer;
            pointer-events: auto; transition: 0.2s;
            box-shadow: 0 0 15px rgba(255, 139, 0, 0.3);
            display: flex; align-items: center; justify-content: center; padding: 0 20px;
        }
        .amber-btn:hover { background: #ff8b00; color: #000; box-shadow: 0 0 40px rgba(255, 139, 0, 0.8); }

        .status-text { color: #ff8b00; font-size: 28px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255, 139, 0, 0.6); text-align: center; }
        
        .side-indicator { position: absolute; top: 20px; font-weight: bold; font-size: 20px; opacity: 0; transition: opacity 1s; width: 250px; }
        #left-side { left: 40px; text-align: left; color: #ff8b00; } 
        #right-side { right: 40px; text-align: right; color: #ff2200; }
        .hp-bar-bg { width: 100%; height: 12px; border: 2px solid currentColor; margin-top: 8px; background: rgba(0,0,0,0.5); }
        .hp-bar-fill { height: 100%; background: currentColor; transition: width 0.3s; box-shadow: 0 0 10px currentColor; }

        #player-container {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); 
            width: 33.3%; background: rgba(10, 5, 0, 0.6); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            cursor: pointer; pointer-events: auto; padding-bottom: 15px;
            transition: opacity 1.5s; z-index: 30; box-shadow: 0 0 20px rgba(255, 139, 0, 0.2);
        }
        #equalizer { display: flex; align-items: flex-end; justify-content: space-evenly; width: 100%; height: 50px; margin-bottom: 10px; overflow: hidden; padding: 0 10px; box-sizing: border-box; }
        .eq-bar { width: 4px; background: #ff8b00; transition: height 0.1s; box-shadow: 0 0 8px #ff8b00; }
        #player-text { color: #ff8b00; font-size: 22px; font-weight: bold; text-shadow: 0 0 10px #ff8b00; text-align: center; }
        
        #version-tag { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); color: #ff8b00; font-size: 15px; z-index: 25; transition: opacity 0.5s; }
        
        #quote-container {
            position: absolute; top: 12%; width: 80%; text-align: center;
            color: #ff8b00; font-size: 22px; font-style: italic; font-weight: bold;
            text-shadow: 0 0 10px #ff8b00; opacity: 0; transition: opacity 2s; z-index: 25; pointer-events: none;
        }

        .hidden { display: none !important; }
        .weapon-hint { color: #ff8b00; font-size: 19px; font-weight: bold; text-shadow: 0 0 10px #ff8b00; }
        .cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div id="boot-screen">
        <div id="boot-terminal">КЛИКНИТЕ ДЛЯ ЗАПУСКА...<span class="cursor">█</span></div>
        <button id="boot-btn" class="amber-btn hidden" style="margin-top: 30px; width: 120px; height: 50px;" onclick="finishBoot()">ДА</button>
    </div>

    <div id="ui-layer">
        <div id="title-container" class="hidden"><span id="typewriter"></span></div>
        
        <div id="quote-container"></div>
        
        <div id="start-menu" class="menu-box hidden">
            <div id="step-fleet">
                <div class="status-text" style="font-size: 24px;">Выбери свой флот:</div>
                <div class="btn-wrapper" style="margin-bottom: 20px;">
                    <button class="amber-btn" onclick="selectFleet('A')">ОРАНЖЕВЫЙ</button>
                    <div class="weapon-hint">20 кораблей</div>
                </div>
                <div class="btn-wrapper">
                    <button class="amber-btn" onclick="selectFleet('B')">КРАСНЫЙ</button>
                    <div class="weapon-hint">30 кораблей</div>
                </div>
            </div>
            <div id="step-weapon" class="hidden">
                <div class="status-text" style="font-size: 24px;">ВЫБЕРИ ОРУЖИЕ:</div>
                <div class="btn-wrapper" style="margin-bottom: 20px;">
                    <button class="amber-btn" onclick="selectWeapon('missile')">РАКЕТЫ</button>
                    <div class="weapon-hint">Медленные, но мощные</div>
                </div>
                <div class="btn-wrapper">
                    <button class="amber-btn" onclick="selectWeapon('laser')">ЛАЗЕРЫ</button>
                    <div class="weapon-hint">Дальнобойные, но слабые</div>
                </div>
            </div>
            <div id="step-tactic" class="hidden">
                <div class="status-text" style="font-size: 24px;">ВЫБЕРИ ТАКТИКУ:</div>
                <div class="btn-wrapper" style="margin-bottom: 20px;">
                    <button class="amber-btn" onclick="selectTactic('attack')">АТАКА</button>
                    <div class="weapon-hint">Вперед на врага!</div>
                </div>
                <div class="btn-wrapper">
                    <button class="amber-btn" onclick="selectTactic('defense')">ОБОРОНА</button>
                    <div class="weapon-hint">Держать строй!</div>
                </div>
            </div>
        </div>

        <div id="restart-menu" class="menu-box hidden"></div>
        
        <div id="left-side" class="side-indicator">
            <span id="label-left">ТВОИ КОРАБЛИ</span>
            <div class="hp-bar-bg"><div id="bar-left" class="hp-bar-fill" style="width: 100%"></div></div>
        </div>
        <div id="right-side" class="side-indicator">
            <span id="label-right">КОРАБЛИ ИИ</span>
            <div class="hp-bar-bg"><div id="bar-right" class="hp-bar-fill" style="width: 100%; float: right;"></div></div>
        </div>
        
        <div id="player-container" class="hidden" onclick="toggleMusic()">
            <div id="equalizer"></div>
            <div id="player-text">уровень нестерпимости | "Битва у темных звезд"</div>
        </div>
        <div id="version-tag" class="hidden">версия 1.11</div>
    </div>
    <canvas id="c" class="hidden"></canvas>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const AMBER = '#ff8b00', RED = '#ff2200', WHITE = '#ffffff';

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function sfx(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'click') {
            osc.frequency.setValueAtTime(1500, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.05);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.start(); osc.stop(now + 0.05);
        } else if (type === 'laser') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
            gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(); osc.stop(now + 0.15);
        } else if (type === 'boom') {
            const bufferSize = audioCtx.sampleRate * 0.5, buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(), filter = audioCtx.createBiquadFilter();
            noise.buffer = buffer; filter.type = 'lowpass'; filter.frequency.setValueAtTime(400, now); filter.frequency.exponentialRampToValueAtTime(10, now + 0.5);
            gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            noise.connect(filter); filter.connect(gain); noise.start();
        } else if (type === 'missile') {
            const bufferSize = audioCtx.sampleRate * 0.4;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(1200, now);
            filter.frequency.exponentialRampToValueAtTime(400, now + 0.4);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.12, now + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            noise.connect(filter); filter.connect(gain);
            noise.start();
        }
    }

    let bgMusic = new Audio('BUTZ.wav');
    bgMusic.loop = false;
    bgMusic.volume = 1.0;
    let eqInterval, isPlaying = true, fadeInterval;

    bgMusic.onended = () => {
        clearInterval(eqInterval);
        const player = document.getElementById('player-container');
        if (player) player.style.opacity = "0";
        setTimeout(() => player.classList.add('hidden'), 1500);
    };

    function initEq() {
        const eq = document.getElementById('equalizer');
        if (!eq) return;
        eq.innerHTML = '';
        const numBars = Math.floor((window.innerWidth * 0.33) / 12);
        for(let i = 0; i < numBars; i++) {
            let bar = document.createElement('div');
            bar.className = 'eq-bar'; bar.style.height = '4px';
            eq.appendChild(bar);
        }
    }

    function startEq() {
        const bars = document.getElementsByClassName('eq-bar');
        eqInterval = setInterval(() => {
            for(let i = 0; i < bars.length; i++) bars[i].style.height = Math.floor(Math.random() * 46 + 4) + 'px';
        }, 120);
    }

    function toggleMusic() {
        clearInterval(fadeInterval);
        if (isPlaying) {
            clearInterval(eqInterval);
            const bars = document.getElementsByClassName('eq-bar');
            for(let i = 0; i < bars.length; i++) bars[i].style.height = '4px';
            fadeInterval = setInterval(() => {
                if (bgMusic.volume > 0.05) bgMusic.volume -= 0.05;
                else { bgMusic.volume = 0; bgMusic.pause(); clearInterval(fadeInterval); }
            }, 100);
            isPlaying = false;
        } else {
            bgMusic.play().catch(e => console.log(e));
            startEq();
            fadeInterval = setInterval(() => {
                if (bgMusic.volume < 0.95) bgMusic.volume += 0.05;
                else { bgMusic.volume = 1.0; clearInterval(fadeInterval); }
            }, 100);
            isPlaying = true;
        }
    }

    let w, h, frame = 0, shake = 0, flash = 0;
    let stars = [], fleet = [], missiles = [], lasers = [], parts = [];
    let combatStarted = false, victoryDeclared = false, simStarted = false;
    let reserveA = 20, reserveB = 30, playerSide = null;
    let reinfA = false, reinfB = false; 
    const initialA = 20, initialB = 30;

    let weaponA, weaponB, speedA = 1.0, speedB = 1.0;

    const fullText = "РЕТРОКОСМОС:<br><span style='font-size: 24px;'>Битва у темных звезд</span>";
    let charIndex = 0;

    // ОБНОВЛЕННЫЕ ЦИТАТЫ
    const warQuotes = [
        "Адмиралы, знающие друг друга, посылают на смерть юнцов, которые не знают никого.",
        "Война — это когда цивилизации демонстрируют свое безумие среди звезд.",
        "Победу в космосе празднует только вакуум.",
        "Истинная победа — та, в которой не погасла ни одна обитаемая звезда.",
        "В звездной пыли нет героев...",
        "Орудия умолкают лишь тогда, когда на мостике некому отдать приказ.",
        "Свет галактик меркнет там, где вспыхивают плазменные залпы.",
        "Битва не определяет, чья идеология верна. Она определяет, чья планета опустеет.",
        "Поля обломков на орбитах — памятники нашей неспособности созидать.",
        "Сколько бы мы ни палили по небу, бездна остается равнодушной.",
        "Самая дорогая цена господства в секторе — потеря собственного милосердия.",
        "Верховные магистры двигают флотилии, а экипажи испаряются в тишине.",
        "Война — это крик ужаса перед бесконечностью космоса.",
        "Пустота поглотит и императоров, и наемников в равной степени.",
        "Каждый торпедный залп — признание краха нашей дипломатии.",
        "Мы вышли к звездам не для того, чтобы превратить их в мишени.",
        "Лучший маневр — тот, который сохранил жизни по обе стороны фронта.",
        "Ослепленные сиянием взрывов, мы забываем, что вселенная едина.",
        "Когда гаснут радары, остается лишь холод совершенных ошибок.",
        "В колыбели цивилизации было тесно, но в бесконечности звезд стало страшно.",
        "Ни один варп-прыжок не позволит убежать от самого себя.",
        "Завтрашние звезды будут светить тем, кто сегодня нашел в себе силы не стрелять."
    ];
    let usedQuotes = [];

    function typeWriter() {
        if (fullText.substring(charIndex, charIndex + 4) === '<br>') charIndex += 4; 
        else if (fullText.substring(charIndex, charIndex + 6) === '<span ') {
            let endSpan = fullText.indexOf('>', charIndex);
            charIndex = endSpan + 1;
        } else charIndex++;
        
        if (charIndex <= fullText.length) {
            document.getElementById("typewriter").innerHTML = fullText.substring(0, charIndex) + '<span class="cursor">█</span>';
            setTimeout(typeWriter, 60); 
        } else {
            document.getElementById("typewriter").innerHTML = fullText;
            document.getElementById('start-menu').classList.remove('hidden');
        }
    }

    function selectFleet(side) {
        sfx('click'); playerSide = side;
        document.getElementById('step-fleet').classList.add('hidden');
        document.getElementById('step-weapon').classList.remove('hidden');
    }

    function selectWeapon(wType) {
        sfx('click');
        if (playerSide === 'A') {
            weaponA = wType;
            weaponB = (wType === 'missile' ? 'laser' : 'missile');
        } else {
            weaponB = wType;
            weaponA = (wType === 'missile' ? 'laser' : 'missile');
        }
        document.getElementById('step-weapon').classList.add('hidden');
        document.getElementById('step-tactic').classList.remove('hidden');
    }

    function selectTactic(tType) {
        sfx('click');
        let aiTactic = (tType === 'attack' ? 'defense' : 'attack');
        
        if (playerSide === 'A') {
            speedA = (tType === 'attack' ? 1.1 : 1.0);
            speedB = (aiTactic === 'attack' ? 1.1 : 1.0);
        } else {
            speedB = (tType === 'attack' ? 1.1 : 1.0);
            speedA = (aiTactic === 'attack' ? 1.1 : 1.0);
        }
        
        startSim();
    }

    function startSim() {
        document.getElementById('start-menu').classList.add('hidden');
        document.getElementById('version-tag').style.opacity = "0";
        document.getElementById('title-container').style.opacity = "0";
        
        const lS = document.getElementById('left-side'), rS = document.getElementById('right-side');
        const lLab = document.getElementById('label-left'), rLab = document.getElementById('label-right');
        
        if (playerSide === 'A') {
            lLab.innerText = "ТВОИ КОРАБЛИ"; rLab.innerText = "КОРАБЛИ ИИ";
            lS.style.color = AMBER; rS.style.color = RED;
        } else {
            lLab.innerText = "КОРАБЛИ ИИ"; rLab.innerText = "ТВОИ КОРАБЛИ";
            lS.style.color = AMBER; rS.style.color = RED;
        }
        
        lS.style.opacity = "1"; rS.style.opacity = "1";
        document.getElementById('player-container').classList.remove('hidden');
        bgMusic.play().catch(e => console.log("Файл BUTZ.wav не найден."));
        startEq();
        simStarted = true; spawnInitialWaves();
    }

    // --- BIOS ---
    const bootTerm = document.getElementById('boot-terminal'), bootBtn = document.getElementById('boot-btn'), bootScreen = document.getElementById('boot-screen');
    let bootStarted = false;

    function bootBeep(freq, dur, type='sine', vol=0.05) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    async function printBoot(text, speed=40, withCursor=true) {
        for (let i = 0; i < text.length; i++) {
            bootTerm.innerHTML = bootTerm.innerHTML.replace('<span class="cursor">█</span>', '');
            bootTerm.innerHTML += text[i] + (withCursor ? '<span class="cursor">█</span>' : '');
            bootBeep(200 + Math.random()*50, 0.05);
            await new Promise(r => setTimeout(r, speed));
        }
    }

    async function runBootSequence() {
        if (bootStarted) return;
        bootStarted = true;
        bootTerm.innerHTML = "";
        await printBoot(">БИОС 1.11... ЗАГРУЖЕН\n", 30);
        await printBoot(">RETROSPACE.OS... ЗАПУЩЕНА\n", 30);
        await printBoot(">ОБНОВЛЕНИЕ.........\n", 50);
        await printBoot(">ОБНАРУЖЕН ИИ... Silbi Shinnaren\n\n", 40);
        await printBoot("Silbi Shinnaren> Привет, человеческий компонент.\n", 60);
        await printBoot("Silbi Shinnaren> Сыграем в битву у темных звезд?", 40, true);
        bootBtn.classList.remove('hidden');
    }

    function finishBoot() {
        sfx('click'); bootScreen.classList.add('glitch-out');
        setTimeout(() => {
            bootScreen.style.display = 'none';
            canvas.classList.remove('hidden');
            document.getElementById('title-container').classList.remove('hidden');
            document.getElementById('version-tag').classList.remove('hidden');
            typeWriter();
        }, 300);
    }

    bootScreen.addEventListener('click', (e) => { if (!bootStarted && e.target.id !== 'boot-btn') runBootSequence(); });

    function resetToMenu() {
        simStarted = false; combatStarted = false; victoryDeclared = false;
        fleet = []; missiles = []; lasers = []; parts = [];
        reserveA = initialA; reserveB = initialB;
        reinfA = false; reinfB = false;
        document.getElementById('restart-menu').classList.add('hidden');
        document.getElementById('left-side').style.opacity = "0";
        document.getElementById('right-side').style.opacity = "0";
        document.getElementById('quote-container').style.opacity = "0";
        document.getElementById('title-container').style.opacity = "1";
        document.getElementById('start-menu').classList.remove('hidden');
        document.getElementById('step-fleet').classList.remove('hidden');
        document.getElementById('step-weapon').classList.add('hidden');
        document.getElementById('step-tactic').classList.add('hidden');
        document.getElementById('player-container').classList.add('hidden');
        bgMusic.pause(); bgMusic.currentTime = 0;
        clearInterval(eqInterval);
    }

    function drawBlackHole(x, y, r, dir) {
        ctx.save(); ctx.translate(x, y);
        let pulseScale = 1 + Math.sin(frame * 0.01) * 0.15;
        for (let i = 0; i < 110; i++) {
            let angle = (i * 0.18) + (frame * 0.012 * dir), distance = (r * 1.2 + (i * 0.22)) * pulseScale;
            ctx.fillStyle = i % 5 === 0 ? WHITE : AMBER; ctx.globalAlpha = (1 - i / 110) * 0.6;
            ctx.fillRect(Math.cos(angle) * distance, Math.sin(angle) * distance, 1.5, 1.5);
        }
        ctx.globalAlpha = 1; let g = ctx.createRadialGradient(0, 0, r, 0, 0, r * 6 * pulseScale);
        g.addColorStop(0, '#000000'); g.addColorStop(0.12, `rgba(255, 100, 0, 0.7)`); g.addColorStop(0.4, `rgba(200, 50, 0, 0.2)`); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r * 6.5 * pulseScale, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    class Ship {
        constructor(side, isSuper = false, delay = 0) {
            this.side = side; this.alive = true; this.isSuper = isSuper;
            this.isFlagship = isSuper ? true : Math.random() > 0.8;
            this.hp = isSuper ? 40 : (this.isFlagship ? 20 : 6);
            let varSize = 0.8 + Math.random() * 0.5;
            this.length = (isSuper ? 80 : (this.isFlagship ? 35 : 12)) * varSize;
            this.width = (isSuper ? 4 : (this.isFlagship ? 2.5 : 1.5)) * varSize;
            this.color = side === 'A' ? AMBER : RED;
            this.weaponType = side === 'A' ? weaponA : weaponB;
            this.speedMult = side === 'A' ? speedA : speedB;
            
            this.x = side === 'A' ? -200 - Math.random()*200 : w + 200 + Math.random()*200;
            this.y = h * 0.1 + Math.random() * (h * 0.8);
            this.angle = 0; this.spinSpeed = 0; this.spinTimer = 0;
            this.isFragmented = false; this.fragments = [];
            this.state = 'WAITING'; this.jumpDelay = delay;
            this.vx = (side === 'A' ? 25 : -25); 
            this.targetVx = (side === 'A' ? 0.12 : -0.12) * this.speedMult;
            this.combatReadyTimer = 180; this.reload = 60;
        }
        fragmentize() {
            this.isFragmented = true; this.spinSpeed = 0;
            for (let i = 0; i < 3; i++) {
                let pts = []; for (let p = 0; p < 4; p++) pts.push({x: (Math.random()-0.5)*(this.length/2), y: (Math.random()-0.5)*(this.width*4)});
                this.fragments.push({ x: 0, y: 0, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, angle: Math.random()*Math.PI*2, rot: (Math.random()-0.5)*0.04, pts: pts });
            }
        }
        update() {
            if (this.state === 'WAITING') { if (--this.jumpDelay <= 0) this.state = 'WARP'; return; }
            if (this.state === 'WARP') { this.x += this.vx; this.vx *= 0.96; if (Math.abs(this.vx) <= Math.abs(this.targetVx)) { this.vx = this.targetVx; this.state = 'STABILIZING'; } }
            else if (this.state === 'STABILIZING') { this.x += this.vx; if (--this.combatReadyTimer <= 0) { this.state = 'COMBAT'; combatStarted = true; } }
            else if (this.state === 'EXIT_WARP') { this.x += this.vx; this.vx *= 1.05; if (this.x < -1000 || this.x > w + 1000) this.alive = false; }
            else {
                this.x += this.vx; this.y += Math.sin(frame * 0.01) * 0.02;
                if (!this.isFlagship && this.hp === 1) {
                    if (this.isFragmented) this.fragments.forEach(f => { f.x += f.vx; f.y += f.vy; f.angle += f.rot; }); 
                    else { this.angle += this.spinSpeed; if (++this.spinTimer > 480) this.fragmentize(); }
                    return; 
                }
                if (--this.reload <= 0 && this.alive && !victoryDeclared) {
                    if (this.weaponType === 'laser' && Math.random() < 0.3) {
                        let enemyMissiles = missiles.filter(m => m.color !== this.color);
                        if (enemyMissiles.length) {
                            let targetM = enemyMissiles[Math.floor(Math.random() * enemyMissiles.length)];
                            lasers.push({x1: this.x, y1: this.y, x2: targetM.x, y2: targetM.y, life: 8, c: this.color});
                            targetM.detonate(); targetM.life = 0; sfx('laser');
                            this.reload = 100 + Math.random() * 50;
                            return;
                        }
                    }

                    let targets = fleet.filter(s => s.side !== this.side && s.alive && s.state === 'COMBAT' && (s.hp > 1 || s.isFlagship));
                    if (targets.length) {
                        let t = targets[Math.floor(Math.random() * targets.length)];
                        if (this.weaponType === 'missile') { missiles.push(new HeavyMissile(this.x, this.y, t, this.color)); sfx('missile'); }
                        else { lasers.push({x1: this.x, y1: this.y, x2: t.x, y2: t.y, life: 8, c: this.color}); t.takeDamage(1); sfx('laser'); }
                        this.reload = (this.isSuper ? 70 : 180) + Math.random() * 100;
                    }
                }
            }
        }
        draw() {
            if(!this.alive || this.state === 'WAITING') return;
            let dir = this.side === 'A' ? 1 : -1;
            if (this.isFragmented) {
                this.fragments.forEach(f => {
                    ctx.save(); ctx.translate(this.x + f.x, this.y + f.y); ctx.rotate(f.angle);
                    ctx.fillStyle = this.color; ctx.globalAlpha = 0.8; ctx.beginPath(); ctx.moveTo(f.pts[0].x, f.pts[0].y);
                    for(let i=1; i<f.pts.length; i++) ctx.lineTo(f.pts[i].x, f.pts[i].y); ctx.closePath(); ctx.fill(); ctx.restore();
                }); return;
            }
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            if (!(this.hp === 1 && !this.isFlagship)) {
                let exWidth = this.isSuper ? 12 : (this.isFlagship ? 6 : 3), exLen = (this.isSuper ? 70 : (this.isFlagship ? 35 : 20)) + Math.random() * 15;
                let g = ctx.createLinearGradient(0, 0, -exLen*dir, 0); g.addColorStop(0, WHITE); g.addColorStop(0.2, this.color); g.addColorStop(1, 'transparent');
                ctx.globalAlpha = 0.9; ctx.strokeStyle = g; ctx.lineWidth = exWidth; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(-(this.length/2)*dir, 0); ctx.lineTo(-(this.length/2+exLen)*dir, (Math.random()-0.5)*3); ctx.stroke();
            }
            ctx.fillStyle = this.color; ctx.globalAlpha = 1; ctx.beginPath(); ctx.moveTo(this.length/2 * dir, 0); ctx.lineTo(-this.length/2 * dir, -this.width); ctx.lineTo(-this.length/2 * dir, this.width); ctx.fill(); ctx.restore();
        }
        takeDamage(dmg) {
            if (this.hp - dmg <= 0 && !this.isFlagship && this.alive) { if (Math.random() < 0.66) this.hp = 1; else this.hp -= dmg; } else this.hp -= dmg;
            for(let i=0; i<8; i++) parts.push(new Particle(this.x, this.y, Math.random() > 0.5 ? WHITE : this.color, false, 0.7));
            if (this.hp === 1 && !this.isFlagship && this.spinSpeed === 0 && !this.isFragmented) { this.spinSpeed = (Math.random() > 0.5 ? 1 : -1) * 0.02; this.spinTimer = 0; }
            if (this.hp <= 0 && this.alive) this.destroy(); else shake = 2; 
        }
        destroy() { this.alive = false; sfx('boom'); flash = this.isSuper ? 1.0 : (this.isFlagship ? 0.6 : 0.2); shake = this.isSuper ? 60 : 15; for(let i=0; i<(this.isSuper?150:40); i++) parts.push(new Particle(this.x, this.y, this.color, true)); }
    }

    class HeavyMissile {
        constructor(x, y, target, color) { this.x = x; this.y = y; this.target = target; this.color = color; this.angle = Math.atan2(target.y - y, target.x - x); this.speed = 1.08; this.life = 1000; this.lastPos = {x: target.x, y: target.y}; }
        update() {
            let isValid = this.target && this.target.alive && (this.target.hp > 1 || this.target.isFlagship), tx = isValid ? this.target.x : this.lastPos.x, ty = isValid ? this.target.y : this.lastPos.y;
            this.lastPos = {x: tx, y: ty}; let dx = tx - this.x, dy = ty - this.y;
            if (Math.hypot(dx, dy) < 6) { if (isValid) this.target.takeDamage(6); else this.detonate(); this.life = 0; }
            else { let ta = Math.atan2(dy, dx), diff = ta - this.angle; while(diff < -Math.PI) diff += Math.PI*2; while(diff > Math.PI) diff -= Math.PI*2; this.angle += diff * 0.04; }
            this.x += Math.cos(this.angle) * this.speed; this.y += Math.sin(this.angle) * this.speed; if (--this.life <= 0) this.detonate();
        }
        detonate() { for(let i=0; i<15; i++) parts.push(new Particle(this.x, this.y, WHITE, true, 0.8)); sfx('boom'); }
        draw() { ctx.fillStyle = this.color; ctx.globalAlpha = 0.6; ctx.fillRect(this.x-1.25, this.y-1.25, 2.5, 2.5); ctx.fillStyle = WHITE; ctx.globalAlpha = 1; ctx.fillRect(this.x-0.75, this.y-0.75, 1.5, 1.5); }
    }

    class Particle {
        constructor(x, y, c, ep, m=1) { this.x = x; this.y = y; this.c = c; let s = (ep ? 2 : 1) * m; this.vx = (Math.random()-0.5)*s; this.vy = (Math.random()-0.5)*s; this.life = 1.0; this.sz = ep ? Math.random()*2 : 1.0; }
        update() { this.x += this.vx; this.y += this.vy; this.life -= 0.005; }
        draw() { ctx.fillStyle = this.life > 0.8 ? WHITE : this.c; ctx.globalAlpha = this.life; ctx.fillRect(this.x, this.y, this.sz, this.sz); }
    }

    function spawnInitialWaves() { for(let i=0; i<8; i++) { if(reserveA > 0) { fleet.push(new Ship('A', false, i*25)); reserveA--; } if(reserveB > 0) { fleet.push(new Ship('B', false, i*25)); reserveB--; } } }

    function checkReinforcements() {
        if (!simStarted || victoryDeclared) return;
        let aliveA = fleet.filter(s => s.side === 'A' && s.alive && (s.hp > 1 || s.isFlagship)).length;
        if (!reinfA && aliveA === 1 && reserveA <= 0) {
            fleet.push(new Ship('A', true, 0)); fleet.push(new Ship('A', false, 30)); fleet.push(new Ship('A', false, 60)); reinfA = true;
        }
        let aliveB = fleet.filter(s => s.side === 'B' && s.alive && (s.hp > 1 || s.isFlagship)).length;
        if (!reinfB && aliveB === 1 && reserveB <= 0) {
            fleet.push(new Ship('B', true, 0)); fleet.push(new Ship('B', false, 30)); fleet.push(new Ship('B', false, 60)); reinfB = true;
        }
    }

    function loop() {
        ctx.setTransform(1, 0, 0, 1, (Math.random()-0.5)*shake, 0); if(shake > 0) shake *= 0.93;
        ctx.fillStyle = 'rgba(2, 1, 0, 0.45)'; ctx.fillRect(-100, -100, w+200, h+200); frame++;
        stars.forEach(s => { let p = 0.4 + Math.abs(Math.sin(frame * 0.005 + s.off)) * 0.4; ctx.fillStyle = AMBER; ctx.globalAlpha = p; ctx.fillRect(s.x, s.y, 1, 1); });
        drawBlackHole(w*0.3, h*0.4, 40, 1); drawBlackHole(w*0.7 + 20, h*0.6, 55, -1);

        if (simStarted && combatStarted && !victoryDeclared) {
            checkReinforcements();
            let nA = fleet.filter(s => s.side === 'A' && s.alive && (s.hp > 1 || s.isFlagship)).length, nB = fleet.filter(s => s.side === 'B' && s.alive && (s.hp > 1 || s.isFlagship)).length;
            const pctA = ((nA + reserveA) / initialA) * 100, pctB = ((nB + reserveB) / initialB) * 100;
            document.getElementById('bar-left').style.width = Math.max(0, pctA) + "%";
            document.getElementById('bar-right').style.width = Math.max(0, pctB) + "%";
            if (nA === 0 && reserveA <= 0) declareVictory('B'); if (nB === 0 && reserveB <= 0) declareVictory('A');
            if (frame % 400 === 0) {
                if (reserveA > 0) { let isS = (nB > nA * 2 && reserveA >= 5); fleet.push(new Ship('A', isS, 0)); reserveA -= isS ? 5 : 1; }
                if (reserveB > 0) { let isS = (nA > nB * 2 && reserveB >= 5); fleet.push(new Ship('B', isS, 0)); reserveB -= isS ? 5 : 1; }
            }
        }
        fleet.forEach(s => { s.update(); s.draw(); });
        lasers.forEach((l, i) => {
            ctx.strokeStyle = l.c; ctx.lineWidth = 3; ctx.globalAlpha = 0.7; ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
            ctx.strokeStyle = WHITE; ctx.lineWidth = 1; ctx.globalAlpha = 1; ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
            if(--l.life <= 0) lasers.splice(i, 1);
        });
        missiles.forEach((m, i) => { m.update(); m.draw(); if(m.life <= 0) missiles.splice(i, 1); });
        parts.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) parts.splice(i, 1); });
        if (flash > 0) { ctx.fillStyle = `rgba(255, 255, 255, ${flash})`; ctx.fillRect(0, 0, w, h); flash -= 0.012; }
        requestAnimationFrame(loop);
    }

    function declareVictory(side) {
        victoryDeclared = true; 
        document.getElementById('left-side').style.opacity = "0"; 
        document.getElementById('right-side').style.opacity = "0";
        setTimeout(() => {
            fleet.forEach(s => { if (s.side === side && (s.hp > 1 || s.isFlagship)) { s.state = 'EXIT_WARP'; s.vx = (side === 'A' ? 0.3 : -0.3); } });
            
            if (usedQuotes.length >= warQuotes.length) usedQuotes = [];
            let availableQuotes = warQuotes.filter(q => !usedQuotes.includes(q));
            let selectedQuote = availableQuotes[Math.floor(Math.random() * availableQuotes.length)];
            usedQuotes.push(selectedQuote);

            const quoteContainer = document.getElementById('quote-container');
            quoteContainer.innerHTML = selectedQuote;
            quoteContainer.style.opacity = "1";
            
            setTimeout(() => {
                const rm = document.getElementById('restart-menu'), win = (side === playerSide);
                rm.innerHTML = `<div class="status-text">${win ? 'ТВОЙ ФЛОТ ПОБЕДИЛ!' : 'ФЛОТ ИИ ПОБЕДИЛ!'}</div>
                <button class="amber-btn" onclick="resetToMenu()">В ГЛАВНОЕ МЕНЮ</button>
                <button class="amber-btn" style="margin-top: 15px;" onclick="location.reload()">ПЕРЕЗАГРУЗКА</button>`;
                rm.classList.remove('hidden');
            }, 4000);
        }, 3000);
    }

    window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; initEq(); };
    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
    initEq();
    for(let i=0; i<250; i++) stars.push({x: Math.random()*w, y: Math.random()*h, off: Math.random()*100});
    loop();
</script>
</body>
